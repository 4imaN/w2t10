services:
  cineride-db:
    image: mongo:7
    container_name: cineride-db
    ports:
      - "27017:27017"
    volumes:
      - cineride-data:/data/db
    networks:
      - cineride-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cineride-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cineride-api
    environment:
      - MONGO_URI=mongodb://cineride-db:27017/cineride
    depends_on:
      cineride-db:
        condition: service_healthy
    volumes:
      - cineride-uploads:/app/uploads
    networks:
      - cineride-net
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://127.0.0.1:3000/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cineride-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cineride-frontend
    ports:
      - "8080:80"
    depends_on:
      cineride-api:
        condition: service_healthy
    networks:
      - cineride-net
    restart: unless-stopped

volumes:
  cineride-data:
  cineride-uploads:

networks:
  cineride-net:
    driver: bridge
