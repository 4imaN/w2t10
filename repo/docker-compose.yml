services:
  cineride-db:
    image: mongo:7
    container_name: cineride-db
    ports:
      - "27017:27017"
    volumes:
      - cineride-data:/data/db
    networks:
      - cineride-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cineride-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cineride-api
    environment:
      - MONGO_URI=mongodb://cineride-db:27017/cineride
    depends_on:
      cineride-db:
        condition: service_healthy
    volumes:
      - cineride-uploads:/app/uploads
    networks:
      - cineride-net
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://127.0.0.1:3000/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cineride-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cineride-frontend
    ports:
      - "8080:80"
    depends_on:
      cineride-api:
        condition: service_healthy
    networks:
      - cineride-net
    restart: unless-stopped

  cineride-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: cineride-test
    environment:
      - MONGO_URI=mongodb://cineride-db:27017/cineride_test
      - NODE_ENV=test
      - JWT_SECRET=test-secret-docker
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    depends_on:
      cineride-db:
        condition: service_healthy
    networks:
      - cineride-net
    profiles:
      - test

  cineride-frontend-test:
    build:
      context: .
      dockerfile: Dockerfile.frontend-test
    container_name: cineride-frontend-test
    profiles:
      - test

  cineride-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    container_name: cineride-e2e
    environment:
      - E2E_BASE_URL=http://cineride-frontend:80
      - E2E_ADMIN_PASSWORD=${E2E_ADMIN_PASSWORD:-DemoAdmin123!}
    depends_on:
      cineride-frontend:
        condition: service_started
    networks:
      - cineride-net
    profiles:
      - e2e

volumes:
  cineride-data:
  cineride-uploads:

networks:
  cineride-net:
    driver: bridge
